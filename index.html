<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型</title>
    <style>
        #div1{
            width: 500px;
            height: 300px;
            /* 背景色为黄色 */
            background-color: yellow;
            /* 内边距为50px; */
            box-sizing: border-box;
            padding: 50px;
            border: 20px solid black;
            margin: 20% auto;
        }
    </style>
</head>
<body>
    <div id="div1">
        <!-- 每空一格给出一个A一共输出30个 -->
         A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A  A
    </div>
</body>
</html>
